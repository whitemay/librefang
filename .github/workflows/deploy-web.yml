name: Deploy Website

on:
  push:
    branches: [main, feat/*, feature/*]
    paths:
      - "web/**"
  pull_request:
    branches: [main]
    paths:
      - "web/**"
  workflow_dispatch:

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      # Corepack must be enabled BEFORE setup-node: setup-node's
      # `cache: pnpm` feature runs `pnpm --version` to compute the cache
      # key, and that fails if pnpm isn't on PATH yet. Modern setup-node
      # (v6 + Node ≥22, which bundles corepack) preserves corepack shims
      # across the Node swap, so running `enable` once up front is
      # sufficient — no need for the second call after setup-node.
      - name: Enable corepack (activates pnpm from packageManager field)
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version-file: "web/.nvmrc"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml

      - run: cd web && pnpm --version && pnpm install --frozen-lockfile

      - run: cd web && pnpm lint

      - run: cd web && pnpm build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web/dist --project-name=librefang --branch=${{ github.head_ref || github.ref_name }}
