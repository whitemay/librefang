name: Lighthouse

on:
  pull_request:
    branches: [main]
    paths:
      - "web/**"
  workflow_dispatch:

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      # Corepack must be enabled BEFORE setup-node: setup-node's
      # `cache: pnpm` feature runs `pnpm --version` to compute the cache
      # key, and that fails if pnpm isn't on PATH yet. Modern setup-node
      # (v6 + Node ≥22, which bundles corepack) preserves corepack shims
      # across the Node swap, so running `enable` once up front is
      # sufficient.
      - name: Enable corepack
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version-file: "web/.nvmrc"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web deps
        run: cd web && pnpm install --frozen-lockfile

      - name: Build
        run: cd web && pnpm build

      - name: Run Lighthouse CI
        run: |
          cd web
          npx --yes @lhci/cli@0.15.x autorun --config=lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
