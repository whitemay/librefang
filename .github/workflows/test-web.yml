name: Test Web

on:
  push:
    branches: [main, feat/*, feature/*]
    paths:
      - "web/**"
  pull_request:
    branches: [main]
    paths:
      - "web/**"
  workflow_dispatch:

concurrency:
  group: test-web-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      # Corepack must be enabled BEFORE setup-node: setup-node's
      # `cache: pnpm` feature runs `pnpm --version` to compute the cache
      # key, and that fails if pnpm isn't on PATH yet. Modern setup-node
      # (v6 + Node ≥22, which bundles corepack) preserves corepack shims
      # across the Node swap, so running `enable` once up front is
      # sufficient.
      - name: Enable corepack (activates pnpm from packageManager field)
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version-file: "web/.nvmrc"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web deps
        run: cd web && pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        run: cd web && pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests
        run: cd web && pnpm test:e2e

      - name: Upload trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace
          path: web/test-results/
          retention-days: 7
