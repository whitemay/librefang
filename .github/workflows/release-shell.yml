name: "Release / Shell"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-shell-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Wait for the GitHub Release to be created ────────────────────────────
  wait_for_release:
    name: Wait for Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/wait-for-release

  # ── Build React dashboard (shared by all binary jobs) ───────────────────
  build_dashboard:
    name: Build Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Install dependencies
        working-directory: crates/librefang-api/dashboard
        run: pnpm install --frozen-lockfile
      - name: Build dashboard
        working-directory: crates/librefang-api/dashboard
        run: pnpm run build
      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: crates/librefang-api/static/react/
          retention-days: 1

  # ── CLI Binary (macOS) ────────────────────────────────────────────────────
  cli_mac:
    name: CLI / ${{ matrix.target }}
    needs: [wait_for_release, build_dashboard]
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
          - target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: dashboard-dist
          path: crates/librefang-api/static/react/
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.target }}-${{ github.ref_name }}
      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} --bin librefang
      - name: Ad-hoc codesign
        run: |
          xattr -cr target/${{ matrix.target }}/release/librefang || true
          codesign --force --sign - target/${{ matrix.target }}/release/librefang
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../librefang-${{ matrix.target }}.tar.gz librefang
          cd ../../..
          shasum -a 256 librefang-${{ matrix.target }}.tar.gz > librefang-${{ matrix.target }}.tar.gz.sha256
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          for attempt in $(seq 1 5); do
            if gh release upload "$TAG" librefang-${{ matrix.target }}.* --clobber; then
              echo "✓ Upload succeeded (attempt $attempt)"
              exit 0
            fi
            echo "Upload failed (attempt $attempt/5), retrying in 10s..."
            sleep 10
          done
          echo "::error::Upload failed after 5 attempts"
          exit 1

  # ── CLI Binary (Linux) ──────────────────────────────────────────────────
  cli_linux:
    name: CLI / ${{ matrix.target }}
    needs: [wait_for_release, build_dashboard]
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            use_cross: true

    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: dashboard-dist
          path: crates/librefang-api/static/react/
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev
      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked
      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.target }}-${{ github.ref_name }}
      - name: Build CLI
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} --bin librefang
          else
            cargo build --release --target ${{ matrix.target }} --bin librefang
          fi
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../librefang-${{ matrix.target }}.tar.gz librefang
          cd ../../..
          sha256sum librefang-${{ matrix.target }}.tar.gz > librefang-${{ matrix.target }}.tar.gz.sha256
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          for attempt in $(seq 1 5); do
            if gh release upload "$TAG" librefang-${{ matrix.target }}.* --clobber; then
              echo "✓ Upload succeeded (attempt $attempt)"
              exit 0
            fi
            echo "Upload failed (attempt $attempt/5), retrying in 10s..."
            sleep 10
          done
          echo "::error::Upload failed after 5 attempts"
          exit 1

  # ── CLI Binary (Android / Termux) ───────────────────────────────────────
  cli_android:
    name: CLI / aarch64-linux-android
    needs: [wait_for_release, build_dashboard]
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: dashboard-dist
          path: crates/librefang-api/static/react/
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cross
        run: cargo install cross --locked
      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-aarch64-linux-android-${{ github.ref_name }}
      - name: Build CLI (Android aarch64)
        run: cross build --release --target aarch64-linux-android --bin librefang
      - name: Package
        run: |
          cd target/aarch64-linux-android/release
          tar czf ../../../librefang-aarch64-linux-android.tar.gz librefang
          cd ../../..
          sha256sum librefang-aarch64-linux-android.tar.gz > librefang-aarch64-linux-android.tar.gz.sha256
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          for attempt in $(seq 1 5); do
            if gh release upload "$TAG" librefang-aarch64-linux-android.* --clobber; then
              echo "✓ Upload succeeded (attempt $attempt)"
              exit 0
            fi
            echo "Upload failed (attempt $attempt/5), retrying in 10s..."
            sleep 10
          done
          echo "::error::Upload failed after 5 attempts"
          exit 1

  # ── CLI Binary (Linux) - Mini (12 channels) ───────────────────────────────
  cli_linux_mini:
    name: CLI / ${{ matrix.target }} (mini)
    needs: [wait_for_release, build_dashboard]
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: dashboard-dist
          path: crates/librefang-api/static/react/
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev
      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-mini-${{ matrix.target }}-${{ github.ref_name }}
      - name: Build CLI (mini)
        run: cargo build --release --target ${{ matrix.target }} --bin librefang --no-default-features --features mini
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../librefang-${{ matrix.target }}-mini.tar.gz librefang
          cd ../../..
          sha256sum librefang-${{ matrix.target }}-mini.tar.gz > librefang-${{ matrix.target }}-mini.tar.gz.sha256
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          for attempt in $(seq 1 5); do
            if gh release upload "$TAG" librefang-${{ matrix.target }}-mini.* --clobber; then
              echo "✓ Upload succeeded (attempt $attempt)"
              exit 0
            fi
            echo "Upload failed (attempt $attempt/5), retrying in 10s..."
            sleep 10
          done
          echo "::error::Upload failed after 5 attempts"
          exit 1

  # ── CLI Binary (Linux, musl — fully static) ─────────────────────────────
  cli_musl:
    name: CLI / ${{ matrix.target }} (static)
    needs: [wait_for_release, build_dashboard]
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
          - target: aarch64-unknown-linux-musl

    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: dashboard-dist
          path: crates/librefang-api/static/react/
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross
        run: cargo install cross --locked
      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.target }}-${{ github.ref_name }}
      - name: Build static CLI
        run: cross build --release --target ${{ matrix.target }} --bin librefang
      - name: Verify static linking
        run: |
          FILE_OUT=$(file target/${{ matrix.target }}/release/librefang)
          echo "$FILE_OUT"
          if ! echo "$FILE_OUT" | grep -qE "statically linked|static-pie linked"; then
            echo "::error::Binary is not statically linked!"
            exit 1
          fi
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../librefang-${{ matrix.target }}.tar.gz librefang
          cd ../../..
          sha256sum librefang-${{ matrix.target }}.tar.gz > librefang-${{ matrix.target }}.tar.gz.sha256
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          for attempt in $(seq 1 5); do
            if gh release upload "$TAG" librefang-${{ matrix.target }}.* --clobber; then
              echo "✓ Upload succeeded (attempt $attempt)"
              exit 0
            fi
            echo "Upload failed (attempt $attempt/5), retrying in 10s..."
            sleep 10
          done
          echo "::error::Upload failed after 5 attempts"
          exit 1

  # ── CLI Binary (Windows) ────────────────────────────────────────────────
  cli_windows:
    name: CLI / ${{ matrix.target }}
    needs: [wait_for_release, build_dashboard]
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
          - target: aarch64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: dashboard-dist
          path: crates/librefang-api/static/react/
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.target }}-${{ github.ref_name }}
      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} --bin librefang
      - name: Package
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/librefang.exe" -DestinationPath "librefang-${{ matrix.target }}.zip"
          $hash = (Get-FileHash "librefang-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  librefang-${{ matrix.target }}.zip" | Out-File -Encoding ASCII "librefang-${{ matrix.target }}.zip.sha256"
      - name: Upload to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          for attempt in $(seq 1 5); do
            if gh release upload "$TAG" librefang-${{ matrix.target }}.* --clobber; then
              echo "✓ Upload succeeded (attempt $attempt)"
              exit 0
            fi
            echo "Upload failed (attempt $attempt/5), retrying in 10s..."
            sleep 10
          done
          echo "::error::Upload failed after 5 attempts"
          exit 1

  # ── CLI Binary (macOS) - Mini ─────────────────────────────────────────────
  cli_mac_mini:
    name: CLI / ${{ matrix.target }} (mini)
    needs: [wait_for_release, build_dashboard]
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: dashboard-dist
          path: crates/librefang-api/static/react/
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-mini-${{ matrix.target }}-${{ github.ref_name }}
      - name: Build CLI (mini)
        run: cargo build --release --target ${{ matrix.target }} --bin librefang --no-default-features --features mini
      - name: Ad-hoc codesign
        run: |
          xattr -cr target/${{ matrix.target }}/release/librefang || true
          codesign --force --sign - target/${{ matrix.target }}/release/librefang
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../librefang-${{ matrix.target }}-mini.tar.gz librefang
          cd ../../..
          shasum -a 256 librefang-${{ matrix.target }}-mini.tar.gz > librefang-${{ matrix.target }}-mini.tar.gz.sha256
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          for attempt in $(seq 1 5); do
            if gh release upload "$TAG" librefang-${{ matrix.target }}-mini.* --clobber; then
              echo "✓ Upload succeeded (attempt $attempt)"
              exit 0
            fi
            echo "Upload failed (attempt $attempt/5), retrying in 10s..."
            sleep 10
          done
          echo "::error::Upload failed after 5 attempts"
          exit 1

  # ── CLI Binary (Windows) - Mini ───────────────────────────────────────────
  cli_windows_mini:
    name: CLI / ${{ matrix.target }} (mini)
    needs: [wait_for_release, build_dashboard]
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: dashboard-dist
          path: crates/librefang-api/static/react/
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-mini-${{ matrix.target }}-${{ github.ref_name }}
      - name: Build CLI (mini)
        run: cargo build --release --target ${{ matrix.target }} --bin librefang --no-default-features --features mini
      - name: Package
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/librefang.exe" -DestinationPath "librefang-${{ matrix.target }}-mini.zip"
          $hash = (Get-FileHash "librefang-${{ matrix.target }}-mini.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  librefang-${{ matrix.target }}-mini.zip" | Out-File -Encoding ASCII "librefang-${{ matrix.target }}-mini.zip.sha256"
      - name: Upload to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          for attempt in $(seq 1 5); do
            if gh release upload "$TAG" librefang-${{ matrix.target }}-mini.* --clobber; then
              echo "✓ Upload succeeded (attempt $attempt)"
              exit 0
            fi
            echo "Upload failed (attempt $attempt/5), retrying in 10s..."
            sleep 10
          done
          echo "::error::Upload failed after 5 attempts"
          exit 1

  # ── CLI Binary → npm ────────────────────────────────────────────────────
  cli_npm:
    name: CLI / npm
    needs: [cli_mac, cli_linux, cli_musl, cli_windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Publish CLI binaries to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          cargo xtask publish-npm-binaries \
            --version "$VERSION" \
            --repo "${{ github.repository }}" \
            --tag "${{ github.ref_name }}"

  # ── CLI Binary → PyPI ──────────────────────────────────────────────────
  cli_pypi:
    name: CLI / PyPI
    needs: [cli_mac, cli_linux, cli_musl, cli_windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Publish CLI binaries to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          cargo xtask publish-pypi-binaries \
            --version "$VERSION" \
            --repo "${{ github.repository }}" \
            --tag "${{ github.ref_name }}"

  # ── Sync to Homebrew Tap ──────────────────────────────────────────────
  sync_homebrew:
    name: Sync to Homebrew Tap
    runs-on: ubuntu-latest
    needs: [cli_mac, cli_linux]
    steps:
      - name: Check out tap repo
        uses: actions/checkout@v6
        with:
          repository: librefang/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Fetch release metadata (with retry for asset availability)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          # Retry up to 10 times (100s total) to allow asset uploads to complete
          for attempt in $(seq 1 10); do
            curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" \
              > release.json

            jq -e '.tag_name and (.assets | type == "array")' release.json >/dev/null

            # Check that all 4 CLI assets exist (macOS + Linux, arm64 + x86_64)
            MAC_ARM_OK=$(jq -r '.assets[] | select(.name == "librefang-aarch64-apple-darwin.tar.gz") | .name' release.json)
            MAC_X86_OK=$(jq -r '.assets[] | select(.name == "librefang-x86_64-apple-darwin.tar.gz") | .name' release.json)
            LNX_ARM_OK=$(jq -r '.assets[] | select(.name == "librefang-aarch64-unknown-linux-gnu.tar.gz") | .name' release.json)
            LNX_X86_OK=$(jq -r '.assets[] | select(.name == "librefang-x86_64-unknown-linux-gnu.tar.gz") | .name' release.json)

            if [ -n "$MAC_ARM_OK" ] && [ -n "$MAC_X86_OK" ] && [ -n "$LNX_ARM_OK" ] && [ -n "$LNX_X86_OK" ]; then
              echo "✓ All 4 CLI assets found on attempt $attempt"
              break
            fi

            if [ "$attempt" -eq 10 ]; then
              echo "::error::CLI assets not found in release after 10 attempts"
              echo "  macOS ARM: ${MAC_ARM_OK:-MISSING}"
              echo "  macOS x86: ${MAC_X86_OK:-MISSING}"
              echo "  Linux ARM: ${LNX_ARM_OK:-MISSING}"
              echo "  Linux x86: ${LNX_X86_OK:-MISSING}"
              exit 1
            fi

            echo "Waiting for CLI assets to be uploaded... ($attempt/10)"
            sleep 10
          done

      - name: Generate formulas (channel-based)
        run: |
          set -euo pipefail

          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          SEMVER="${VERSION}"

          asset_url() {
            jq -r --arg name "$1" '.assets[] | select(.name == $name) | .browser_download_url' release.json
          }

          asset_sha() {
            local sha_url
            sha_url="$(jq -r --arg name "${1}.sha256" '.assets[] | select(.name == $name) | .browser_download_url' release.json)"
            if [ -z "$sha_url" ] || [ "$sha_url" = "null" ]; then
              local asset_url
              asset_url="$(jq -r --arg name "$1" '.assets[] | select(.name == $name) | .browser_download_url' release.json)"
              curl -fsSL "$asset_url" | sha256sum | awk '{print $1}'
            else
              curl -fsSL "$sha_url" | awk '{print $1}'
            fi
          }

          asset_size() {
            jq -r --arg name "$1" '.assets[] | select(.name == $name) | .size' release.json
          }

          # macOS assets
          ARM64_DARWIN_NAME="librefang-aarch64-apple-darwin.tar.gz"
          X86_DARWIN_NAME="librefang-x86_64-apple-darwin.tar.gz"
          # Linux assets
          ARM64_LINUX_NAME="librefang-aarch64-unknown-linux-gnu.tar.gz"
          X86_LINUX_NAME="librefang-x86_64-unknown-linux-gnu.tar.gz"

          ARM64_DARWIN_URL="$(asset_url "$ARM64_DARWIN_NAME")"
          X86_DARWIN_URL="$(asset_url "$X86_DARWIN_NAME")"
          ARM64_LINUX_URL="$(asset_url "$ARM64_LINUX_NAME")"
          X86_LINUX_URL="$(asset_url "$X86_LINUX_NAME")"

          ARM64_DARWIN_SHA="$(asset_sha "$ARM64_DARWIN_NAME")"
          X86_DARWIN_SHA="$(asset_sha "$X86_DARWIN_NAME")"
          ARM64_LINUX_SHA="$(asset_sha "$ARM64_LINUX_NAME")"
          X86_LINUX_SHA="$(asset_sha "$X86_LINUX_NAME")"

          ARM64_DARWIN_SIZE="$(asset_size "$ARM64_DARWIN_NAME")"
          X86_DARWIN_SIZE="$(asset_size "$X86_DARWIN_NAME")"
          ARM64_LINUX_SIZE="$(asset_size "$ARM64_LINUX_NAME")"
          X86_LINUX_SIZE="$(asset_size "$X86_LINUX_NAME")"

          for required in \
            ARM64_DARWIN_URL X86_DARWIN_URL ARM64_LINUX_URL X86_LINUX_URL \
            ARM64_DARWIN_SHA X86_DARWIN_SHA ARM64_LINUX_SHA X86_LINUX_SHA \
            ARM64_DARWIN_SIZE X86_DARWIN_SIZE ARM64_LINUX_SIZE X86_LINUX_SIZE
          do
            if [ -z "${!required}" ] || [ "${!required}" = "null" ]; then
              echo "Missing release metadata: $required" >&2
              exit 1
            fi
          done

          for size_var in ARM64_DARWIN_SIZE X86_DARWIN_SIZE ARM64_LINUX_SIZE X86_LINUX_SIZE
          do
            if [ "${!size_var}" -le 0 ]; then
              echo "Release asset is empty: $size_var" >&2
              exit 1
            fi
          done

          # Channel strategy (like Apple software updates):
          #   -rc tag    → update rc channel only
          #   -beta tag  → update beta + rc channels
          #   stable tag → update stable + beta + rc channels
          if echo "$VERSION" | grep -qE '\-rc'; then
            CHANNELS=(rc)
          elif echo "$VERSION" | grep -qE '\-beta'; then
            CHANNELS=(beta rc)
          else
            CHANNELS=(stable beta rc)
          fi

          echo "Release $VERSION → updating formula channels: ${CHANNELS[*]}"

          ALL_CHANNELS=(stable beta rc)

          generate_formula() {
            local channel="$1"
            local formula_name="librefang"
            local class_name="Librefang"
            local desc_suffix=""

            if [ "$channel" != "stable" ]; then
              formula_name="librefang-${channel}"
              # librefang-beta → LibrefangBeta, librefang-rc → LibrefangRc
              local suffix
              suffix="$(echo "${channel}" | sed 's/.*/\u&/')"
              class_name="Librefang${suffix}"
              desc_suffix=" (${channel} channel)"
            fi

            # Build conflicts_with lines
            local conflicts=""
            for other in "${ALL_CHANNELS[@]}"; do
              [ "$other" = "$channel" ] && continue
              local other_name="librefang"
              [ "$other" != "stable" ] && other_name="librefang-${other}"
              conflicts="${conflicts}
            conflicts_with \"${other_name}\", because: \"both install a \\\`librefang\\\` binary\""
            done

            # Livecheck only for stable channel
            local livecheck=""
            if [ "$channel" = "stable" ]; then
              livecheck='

            livecheck do
              url "https://github.com/librefang/librefang/releases/latest"
              strategy :header_match
            end'
            fi

            mkdir -p tap/Formula
            cat > "tap/Formula/${formula_name}.rb" <<FORMULA
          class ${class_name} < Formula
            desc "Community-Maintained Agent Operating System written in Rust${desc_suffix}"
            homepage "https://librefang.ai"
            license "MIT"
            version "$SEMVER"
          ${conflicts}${livecheck}

            on_macos do
              if Hardware::CPU.arm?
                url "$ARM64_DARWIN_URL"
                sha256 "$ARM64_DARWIN_SHA"
              else
                url "$X86_DARWIN_URL"
                sha256 "$X86_DARWIN_SHA"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "$ARM64_LINUX_URL"
                sha256 "$ARM64_LINUX_SHA"
              else
                url "$X86_LINUX_URL"
                sha256 "$X86_LINUX_SHA"
              end
            end

            def install
              bin.install "librefang"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/librefang --version")
            end
          end
          FORMULA

            echo "=== Formula: ${formula_name} ==="
            cat "tap/Formula/${formula_name}.rb"
          }

          for channel in "${CHANNELS[@]}"; do
            generate_formula "$channel"
          done

          # --- Versioned formula (e.g. librefang@2026.3.2114) ---
          # Always generated for every release, regardless of channel
          CLASS_SUFFIX=$(echo "$SEMVER" | tr -d '.')
          CLASS_NAME="LibrefangAT${CLASS_SUFFIX}"

          cat > "tap/Formula/librefang@${SEMVER}.rb" <<FORMULA
          class ${CLASS_NAME} < Formula
            desc "Community-Maintained Agent Operating System written in Rust"
            homepage "https://librefang.ai"
            license "MIT"
            version "$SEMVER"

            on_macos do
              if Hardware::CPU.arm?
                url "$ARM64_DARWIN_URL"
                sha256 "$ARM64_DARWIN_SHA"
              else
                url "$X86_DARWIN_URL"
                sha256 "$X86_DARWIN_SHA"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "$ARM64_LINUX_URL"
                sha256 "$ARM64_LINUX_SHA"
              else
                url "$X86_LINUX_URL"
                sha256 "$X86_LINUX_SHA"
              end
            end

            keg_only :versioned_formula

            def install
              bin.install "librefang"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/librefang --version")
            end
          end
          FORMULA

          echo ""
          echo "=== Versioned formula: librefang@${SEMVER}.rb ==="
          cat "tap/Formula/librefang@${SEMVER}.rb"

      - name: Commit and push
        working-directory: tap
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "chore: update formula channels to ${{ github.ref_name }}" || echo "No changes"
          git push
