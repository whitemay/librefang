    <meta property="og:url" content="https://librefang.ai/" />
    <meta property="og:title" content="LibreFang - The Agent Operating System" />
    <meta property="og:description" content="Run autonomous AI agents 24/7. Built in Rust for production workloads." />
    <meta property="og:image" content="https://librefang.ai/og-image.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="LibreFang - The Agent Operating System" />
    <meta name="twitter:description" content="Run autonomous AI agents 24/7. Built in Rust for production workloads." />
    <meta name="twitter:image" content="https://librefang.ai/og-image.svg" />
    <link rel="canonical" href="https://librefang.ai/" />
    <link rel="dns-prefetch" href="https://api.github.com" />
    <link rel="preconnect" href="https://stats.librefang.ai" crossorigin />
    <link rel="dns-prefetch" href="https://raw.githubusercontent.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <script>
      // Load CJK font based on detected language
      (function() {
        var fontMap = { 'zh': 'Noto+Sans+SC', 'zh-TW': 'Noto+Sans+TC', 'ja': 'Noto+Sans+JP', 'ko': 'Noto+Sans+KR' };
        var lang = window.__INITIAL_LANG__ || 'en';
        var font = fontMap[lang];
        if (font) {
          var link = document.createElement('link');
          link.rel = 'stylesheet';
          link.href = 'https://fonts.googleapis.com/css2?family=' + font + ':wght@400;500;700;900&display=swap';
          document.head.appendChild(link);
        }
      })();
    </script>
    <title>LibreFang - The Agent Operating System</title>
    <script>
      (function() {
        var lang = 'en';
        var path = window.location.pathname;
        if (path.startsWith('/zh-TW')) lang = 'zh-TW';
        else if (path.startsWith('/zh')) lang = 'zh';
        else if (path.startsWith('/de')) lang = 'de';
        else if (path.startsWith('/ja')) lang = 'ja';
        else if (path.startsWith('/ko')) lang = 'ko';
        else if (path.startsWith('/es')) lang = 'es';
        document.documentElement.lang = lang;
        window.__INITIAL_LANG__ = lang;

        // Localized meta description before React hydrates, so crawlers /
        // link-unfurls that don't execute JS still see the right language.
        var metaDesc = {
          'zh':    'LibreFang — Agent 操作系统。基于 Rust，生产级运行时，7x24 运行自主 AI Agent。',
          'zh-TW': 'LibreFang — Agent 作業系統。基於 Rust，生產級執行環境，7x24 運行自主 AI Agent。',
          'ja':    'LibreFang — Agent オペレーティングシステム。Rust 製の本番グレードランタイムで自律 AI エージェントを 24 時間稼働。',
          'ko':    'LibreFang — Agent 운영체제. Rust로 만든 프로덕션급 런타임으로 자율 AI 에이전트 24시간 운영.',
          'de':    'LibreFang — Das Agent-Betriebssystem. Produktionsreife Rust-Laufzeit für autonome KI-Agenten rund um die Uhr.',
          'es':    'LibreFang — El sistema operativo para Agents. Runtime Rust de grado de producción para agentes IA autónomos 24/7.',
        };
        if (metaDesc[lang]) {
          var d = document.querySelector('meta[name="description"]');
          if (d) d.setAttribute('content', metaDesc[lang]);
          var og = document.querySelector('meta[property="og:description"]');
          if (og) og.setAttribute('content', metaDesc[lang]);
          var tw = document.querySelector('meta[name="twitter:description"]');
          if (tw) tw.setAttribute('content', metaDesc[lang]);
        }

        // Initialize theme
        var theme = localStorage.getItem('theme') || 'dark';
        document.documentElement.classList.add(theme);
      })();
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "LibreFang",
      "description": "Production-grade Agent Operating System built in Rust. Run autonomous AI agents 24/7.",
      "url": "https://librefang.ai",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Linux, macOS, Windows",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "author": { "@type": "Organization", "name": "LibreFang", "url": "https://librefang.ai" },
      "codeRepository": "https://github.com/librefang/librefang",
      "license": "https://github.com/librefang/librefang/blob/main/LICENSE",
      "programmingLanguage": "Rust"
    }
    </script>
  </head>

    <div id="root"></div>

      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-9Q0WS7SHZ6');
    </script>

    <!-- Visit Counter -->
    <script src="https://counter.librefang.ai/script.js" async></script>

    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(() => {})
      }
    </script>
  </body>
</html>
